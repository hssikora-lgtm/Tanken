<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sprit-Monitor Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --excel-green: #217346; --bg: #f0f2f5; --accent: #ffd54f; --danger: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #333; padding-top: env(safe-area-inset-top); }
        .card { max-width: 600px; margin: 0 auto 12px auto; background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); padding: 15px; }
        h2 { color: var(--excel-green); text-align: center; margin: 0 0 12px 0; font-size: 1.1em; text-transform: uppercase; letter-spacing: 1px; }
        
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }
        .stat-card { background: #f8f9fa; padding: 10px; border-radius: 8px; text-align: center; border-bottom: 3px solid var(--excel-green); }
        .stat-label { font-size: 0.65em; color: #666; text-transform: uppercase; margin-bottom: 3px; }
        .stat-val { font-size: 1em; font-weight: bold; }

        .form-mini { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 16px; text-align: center; -webkit-appearance: none; }
        .full { grid-column: span 2; }
        button { width: 100%; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-add { background: var(--excel-green); color: white; margin-top: 5px; }
        
        .table-fixed-head { margin-top: 10px; border: 1px solid #eee; border-radius: 8px; overflow: hidden; }
        /* Hier wird die Sichtbarkeit gesteuert (ca. 4-5 Zeilen) */
        .table-scroll { max-height: 260px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
        th { background: #efefef; position: sticky; top: 0; padding: 10px; z-index: 1; border-bottom: 2px solid #ddd; }
        td { padding: 12px 5px; border-bottom: 1px solid #eee; text-align: center; }
        
        .kw-badge { background: var(--accent); font-weight: bold; padding: 2px 6px; border-radius: 4px; display: inline-block; border: 1px solid #e0c040; }
        .chart-container { height: 220px; }

        .util-area { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .btn-util { background: none; border: 1px solid #ccc; color: #666; font-size: 0.75em; padding: 8px; }
        .footer { text-align: center; font-size: 0.7em; color: #999; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <h2>⛽ Neuer Eintrag</h2>
    <div class="form-mini">
        <input type="date" id="date" class="full">
        <input type="number" id="km_stand" placeholder="KM Stand" inputmode="numeric">
        <input type="number" id="liter" placeholder="Liter" step="0.01" inputmode="decimal">
        <input type="number" id="preis" placeholder="€ / Liter" step="0.001" class="full" inputmode="decimal">
        <button class="btn-add full" onclick="addEntry()">DATEN SPEICHERN</button>
    </div>
</div>

<div class="card">
    <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Gesamt km</div><div id="total_km" class="stat-val">-</div></div>
        <div class="stat-card"><div class="stat-label">Kosten 2026</div><div id="costs_2026" class="stat-val" style="color: var(--danger);">-</div></div>
        <div class="stat-card"><div class="stat-label">Ø km / Monat</div><div id="avg_month" class="stat-val">-</div></div>
        <div class="stat-card"><div class="stat-label">Gekauft</div><div class="stat-val">04/2022</div></div>
    </div>
</div>

<div class="card chart-container"><canvas id="myChart"></canvas></div>

<div class="card">
    <div class="table-fixed-head">
        <table>
            <thead>
                <tr>
                    <th style="width:15%">kw</th>
                    <th style="width:25%">Datum</th>
                    <th style="width:20%">l/100</th>
                    <th style="width:20%">Trip</th>
                    <th style="width:20%">Kosten</th>
                </tr>
            </thead>
        </table>
        <div class="table-scroll"><table><tbody id="logBody"></tbody></table></div>
    </div>
    <div class="util-area">
        <button class="btn-util" onclick="exportData()">💾 BACKUP SICHERN</button>
        <button class="btn-util" onclick="deleteLastEntry()" style="color:var(--danger); border-color:var(--danger);">🗑️ EINTRAG LÖSCHEN</button>
    </div>
</div>

<div class="footer">by HauniBauni</div>

<script>
    const KM_KAUF = 118138;
    const KAUF_DATUM = new Date('2022-04-01');

    let entries = JSON.parse(localStorage.getItem('sprit_final_v2026_top')) || [
        { datum: '2025-12-22', stand: 173698, liter: 61.81, preis: 1.465 },
        { datum: '2026-01-17', stand: 174508, liter: 59.94, preis: 1.439 },
        { datum: '2026-02-07', stand: 175363, liter: 59.36, preis: 1.495 },
        { datum: '2026-03-01', stand: 176233, liter: 60.71, preis: 1.535 }
    ];

    function fmt(n, d=0) { return n.toLocaleString('de-DE', {minimumFractionDigits: d, maximumFractionDigits: d}); }
    function getKW(dStr) {
        let d = new Date(dStr); d.setHours(0,0,0,0);
        d.setDate(d.getDate() + 4 - (d.getDay() || 7));
        return Math.ceil((((d - new Date(d.getFullYear(),0,1)) / 86400000) + 1) / 7);
    }

    function update() {
        entries.sort((a,b) => new Date(a.datum) - new Date(b.datum));
        const tbody = document.getElementById('logBody');
        tbody.innerHTML = '';
        let labels = [], values = [], totalCosts2026 = 0;

        entries.forEach((row, i) => {
            let tKm = (i === 0) ? 901 : row.stand - entries[i-1].stand;
            let verb = (row.liter * 100) / tKm;
            let cost = row.liter * row.preis;
            
            if(new Date(row.datum).getFullYear() === 2026) totalCosts2026 += cost;

            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td style="width:15%"><span class="kw-badge">${getKW(row.datum)}</span></td>
                <td style="width:25%">${new Date(row.datum).toLocaleDateString('de-DE', {day:'2-digit', month:'2-digit'})}</td>
                <td style="width:20%"><b>${fmt(verb, 2)}</b></td>
                <td style="width:20%">${fmt(tKm, 0)}</td>
                <td style="width:20%">${fmt(cost, 2)}€</td>
            `;
            tbody.appendChild(tr); // Chronologisch: KW 52 bleibt oben

            labels.push("KW " + getKW(row.datum));
            values.push(verb.toFixed(2));
        });

        if(entries.length > 0) {
            const lastStand = entries[entries.length-1].stand;
            document.getElementById('total_km').innerText = fmt(lastStand - KM_KAUF) + " km";
            document.getElementById('costs_2026').innerText = fmt(totalCosts2026, 2) + " €";
            let monate = (new Date() - KAUF_DATUM) / (1000 * 60 * 60 * 24 * 30.44);
            document.getElementById('avg_month').innerText = fmt((lastStand - KM_KAUF) / monate) + " km";
        }

        localStorage.setItem('sprit_final_v2026_top', JSON.stringify(entries));
        renderChart(labels, values);
    }

    let chart;
    function renderChart(l, d) {
        const ctx = document.getElementById('myChart').getContext('2d');
        if(chart) chart.destroy();
        chart = new Chart(ctx, {
            type: 'line',
            data: { labels: l, datasets: [{ data: d, borderColor: '#217346', tension: 0.3, fill: true, backgroundColor: 'rgba(33, 115, 70, 0.1)' }]},
            options: { maintainAspectRatio: false, plugins: { legend: {display: false} } }
        });
    }

    function addEntry() {
        const d = document.getElementById('date').value, s = parseFloat(document.getElementById('km_stand').value), l = parseFloat(document.getElementById('liter').value), p = parseFloat(document.getElementById('preis').value);
        if(!d || !s || !l || !p) return alert("Bitte alle Felder ausfüllen!");
        entries.push({ datum: d, stand: s, liter: l, preis: p });
        update();
    }

    function deleteLastEntry() { if(confirm("Eintrag löschen?")) { entries.pop(); update(); } }
    
    function exportData() {
        const blob = new Blob([JSON.stringify(entries, null, 2)], { type: "text/plain" });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = "sprit_backup.txt";
        a.click();
    }

    document.getElementById('date').valueAsDate = new Date();
    update();
</script>
</body>
</html>
